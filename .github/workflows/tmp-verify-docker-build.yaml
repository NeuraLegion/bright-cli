# TEMPORARY workflow — DELETE AFTER VERIFICATION.
#
# Purpose: verify that @brightsec/node-libcurl@5.0.14-0 ships a
# linux-arm64-musl prebuilt binary so the Docker linux/arm64 platform
# build no longer falls back to compiling from source.
#
# The critical test is whether `npm i @brightsec/node-libcurl@5.0.14-0`
# inside an Alpine arm64 layer succeeds without a native build toolchain.
# Dockerfile.verify contains the minimal Alpine build definition.
#
# To remove: delete this file and Dockerfile.verify.
name: tmp-verify-docker-build

defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
  push:
    branches:
      - fix/node-libcurl-5.0.14-0

concurrency:
  group: tmp-verify-docker-build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  verify-docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Dockerfile.verify for linux/amd64 + linux/arm64.
      # It installs @brightsec/node-libcurl@5.0.14-0 on Alpine WITHOUT a
      # native toolchain (no gcc/python/make). The build succeeds only if the
      # linux-arm64-musl prebuilt binary is present — exactly what this PR
      # verifies. `--output type=cacheonly` builds both platforms fully but
      # writes nothing to any registry.
      - name: Verify node-libcurl prebuilt binary on linux/amd64 and linux/arm64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.verify
          platforms: linux/amd64,linux/arm64
          push: false
          outputs: type=cacheonly
