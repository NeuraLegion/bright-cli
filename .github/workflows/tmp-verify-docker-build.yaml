# TEMPORARY workflow — DELETE AFTER VERIFICATION.
#
# Purpose: verify that the multi-platform Docker image builds successfully
# with the updated @brightsec/node-libcurl dependency, WITHOUT pushing to
# Docker Hub or any registry.
#
# Mirrors the `publish-docker` job from deploy.yml, with these changes:
#   - Triggered by branch push / workflow_dispatch instead of release event
#   - No Docker Hub login required (no credentials used)
#   - `push: false` + `outputs: type=cacheonly` so both platforms are fully
#     built and validated but nothing is written to any registry
#   - No NPM propagation wait (we test the Dockerfile directly from the branch)
#
# The critical test is whether `npm i -g @brightsec/cli@<version>` inside the
# Alpine arm64 layer can pull and load the new linux-arm64-musl prebuilt.
#
# To remove: delete this single file.
name: tmp-verify-docker-build

defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
  push:
    branches:
      - fix/node-libcurl-5.0.14-0

concurrency:
  group: tmp-verify-docker-build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  verify-docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build linux/amd64 + linux/arm64 without pushing anywhere.
      # `outputs: type=cacheonly` writes only to the BuildKit layer cache —
      # it builds every layer for both platforms (validating the npm install
      # and prebuilt binary download) but never exports a manifest or pushes
      # to a registry. No Docker Hub credentials are needed or used.
      - name: Build Multi-Platform Image (dry-run, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          outputs: type=cacheonly
          build-args: |
            VERSION=5.0.14-0
