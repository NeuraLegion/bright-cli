# TEMPORARY workflow — DELETE AFTER VERIFICATION.
#
# Purpose: verify that @brightsec/node-libcurl@5.0.14-0 ships a
# linux-arm64-musl prebuilt binary so the Docker linux/arm64 platform
# build no longer falls back to compiling from source.
#
# The critical test is whether `npm i @brightsec/node-libcurl@5.0.14-0`
# inside an Alpine arm64 layer succeeds without a native build toolchain.
# We use a minimal inline Dockerfile so we don't need a published
# @brightsec/cli release for this check.
#
# To remove: delete this single file.
name: tmp-verify-docker-build

defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
  push:
    branches:
      - fix/node-libcurl-5.0.14-0

concurrency:
  group: tmp-verify-docker-build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  verify-docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build a minimal Alpine image for linux/amd64 + linux/arm64 that only
      # installs @brightsec/node-libcurl@5.0.14-0. This validates that the
      # prebuilt binary for linux-arm64-musl is present in the package and
      # can be loaded without a native build toolchain (no gcc/python/make).
      # `--output type=cacheonly` builds both platforms fully but writes
      # nothing to any registry.
      - name: Verify node-libcurl prebuilt binary on linux/amd64 and linux/arm64
        run: |
          cat > /tmp/Dockerfile.verify <<'DOCKERFILE'
FROM node:24-alpine
# Install without a native toolchain — must succeed via prebuilt only
RUN npm install --ignore-scripts=false @brightsec/node-libcurl@5.0.14-0 \
    && node -e "require('@brightsec/node-libcurl')" \
    && echo "node-libcurl loaded successfully"
DOCKERFILE
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --output type=cacheonly \
            --file /tmp/Dockerfile.verify \
            /tmp
