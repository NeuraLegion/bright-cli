name: '[TMP] Test Multi-Platform Docker Build'

# Temporary workflow to validate the Dockerfile fix for arm64 native module
# compilation (node-libcurl source build fallback on linux-arm64-musl).
# Related failing job: https://github.com/NeuraLegion/bright-cli/actions/runs/26173503585/job/76997703187
#
# This file should be removed once the fix is confirmed and merged to next.

on:
  push:
    branches:
      - fix/dockerfile-arm64-build-deps
  workflow_dispatch:
    inputs:
      version:
        description: '@brightsec/cli version to install (e.g. v13.11.0-next.6)'
        required: false
        default: 'v13.11.0-next.6'

env:
  VERSION: ${{ github.event.inputs.version || 'v13.11.0-next.6' }}

jobs:
  test-docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Multi-Platform Images (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            VERSION=${{ env.VERSION }}
          tags: |
            brightsec/cli:${{ env.VERSION }}-test
